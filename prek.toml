minimum_pre_commit_version = "4.0.0"
default_install_hook_types = ["pre-commit", "pre-push"]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "devkit-verify-fast"
name = "DevKit verify fast"
entry = "uv run --project plugins/devkit python plugins/devkit/scripts/devkit_harness.py verify-fast"
language = "system"
pass_filenames = false
stages = ["pre-commit"]

[[repos.hooks]]
id = "devkit-verify-full"
name = "DevKit verify full"
entry = "uv run --project plugins/devkit python plugins/devkit/scripts/devkit_harness.py verify-full"
language = "system"
pass_filenames = false
stages = ["pre-push"]
