provider: openai
runtime: codex-cli
profiles:
  max_reasoning:
    model: gpt-5.3-codex
    effort: xhigh
  high_fast:
    model: gpt-5.3-codex-spark
    effort: xhigh
  fast_first:
    model: gpt-5.3-codex-spark
    effort: xhigh
fallbacks:
  - when: model_unavailable
    use:
      model: gpt-5.3-codex
      effort: high
  - when: effort_unsupported
    use:
      effort: high
