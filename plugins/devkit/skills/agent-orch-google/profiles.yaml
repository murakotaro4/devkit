provider: google
runtime: gemini-cli
profiles:
  max_reasoning:
    model: gemini-2.5-pro
    effort: prompt_high
  high_fast:
    model: gemini-2.5-flash
    effort: prompt_high
  fast_first:
    model: gemini-2.5-flash
    effort: prompt_medium
fallbacks:
  - when: model_unavailable
    use:
      model: gemini-2.5-pro
      effort: prompt_high
