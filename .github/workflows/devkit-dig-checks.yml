name: DevKit Dig Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: devkit-dig-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dig-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DIG_VERSION_BASE_REF: origin/${{ github.base_ref || 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync harness dependencies
        run: uv sync --project plugins/devkit

      - name: CI context
        run: |
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "base_ref=${{ github.base_ref }}"
          echo "head_ref=${{ github.head_ref }}"
          echo "DIG_VERSION_BASE_REF=${DIG_VERSION_BASE_REF}"

      - name: Run harness verify
        run: uv run --project plugins/devkit python plugins/devkit/scripts/devkit_harness.py verify-full

      - name: Summary
        if: always()
        run: |
          {
            echo "## DevKit Dig Checks";
            echo "";
            echo "- Workflow: \`DevKit Dig Checks\`";
            echo "- Stage: \`uv run verify-full\`";
            echo "- Base ref used by version gate: \`${DIG_VERSION_BASE_REF}\`";
            echo "";
            echo "### Local parity commands";
            echo "\`\`\`bash";
            echo "uv sync --project plugins/devkit";
            echo "uv run --project plugins/devkit python plugins/devkit/scripts/devkit_harness.py verify-fast";
            echo "uv run --project plugins/devkit python plugins/devkit/scripts/devkit_harness.py verify-full";
            echo "prek run --all-files --hook-stage pre-commit";
            echo "prek run --all-files --hook-stage pre-push";
            echo "\`\`\`";
            echo "";
            echo "### GitHub-side verification";
            echo "\`\`\`bash";
            echo "gh pr checks <PR_NUMBER> --watch";
            echo "gh run list --workflow \"DevKit Dig Checks\" --limit 10";
            echo "powershell -NoProfile -ExecutionPolicy Bypass -File .\\scripts\\ci\\assert-pr-checks.ps1 -PrNumber <PR_NUMBER>";
            echo "\`\`\`";
          } >> "$GITHUB_STEP_SUMMARY"
