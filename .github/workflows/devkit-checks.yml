name: DevKit Checks

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: devkit-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  devkit-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DEVKIT_VERSION_BASE_REF: origin/${{ github.base_ref || 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync harness dependencies
        run: uv sync --project plugins/devkit

      - name: CI context
        run: |
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "base_ref=${{ github.base_ref }}"
          echo "head_ref=${{ github.head_ref }}"
          echo "DEVKIT_VERSION_BASE_REF=${DEVKIT_VERSION_BASE_REF}"

      - name: Run harness verify
        run: uv run --project plugins/devkit python plugins/devkit/scripts/devkit_harness.py verify-full

      - name: Summary
        if: always()
        run: |
          {
            echo "## DevKit Checks";
            echo "";
            echo "- Workflow: \`DevKit Checks\`";
            echo "- Stage: \`uv run verify-full\`";
            echo "- Base ref used by version gate: \`${DEVKIT_VERSION_BASE_REF}\`";
            echo "";
            echo "### Local parity commands";
            echo "\`\`\`bash";
            echo "uv sync --project plugins/devkit";
            echo "uv run --project plugins/devkit python plugins/devkit/scripts/devkit_harness.py verify-fast";
            echo "uv run --project plugins/devkit python plugins/devkit/scripts/devkit_harness.py verify-full";
            echo "prek run --all-files --hook-stage pre-commit";
            echo "prek run --all-files --hook-stage pre-push";
            echo "\`\`\`";
            echo "";
            echo "### GitHub-side verification";
            echo "\`\`\`bash";
            echo "gh pr checks <PR_NUMBER> --watch";
            echo "gh run list --workflow \"DevKit Checks\" --limit 10";
            echo "powershell -NoProfile -ExecutionPolicy Bypass -File .\\scripts\\ci\\assert-pr-checks.ps1 -PrNumber <PR_NUMBER>";
            echo "\`\`\`";
          } >> "$GITHUB_STEP_SUMMARY"

  devkit-checks-windows:
    runs-on: windows-latest
    timeout-minutes: 25
    env:
      DEVKIT_VERSION_BASE_REF: origin/${{ github.base_ref || 'main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync harness dependencies
        run: uv sync --project plugins/devkit

      - name: Run harness verify
        run: uv run --project plugins/devkit python plugins/devkit/scripts/devkit_harness.py verify-full

  devkit-checks-windows-updater-smoke:
    if: github.event_name == 'pull_request'
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run Windows updater smoke
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/ci/windows-updater-smoke.ps1

  devkit-checks-windows-font-experiment:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    continue-on-error: true
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run winget font experiment
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/ci/windows-font-experiment.ps1
      - name: Write experiment summary
        if: always()
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/ci/windows-font-experiment-summary.ps1
